<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product | Abhishek Sessions</title>
  <style>
    :root{--bg:#0b0b0f;--text:#e9e9ee;--muted:#b8b8c6;--gold:#d4af37;--line:rgba(212,175,55,.22);}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 80px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .btn{
      text-decoration:none;color:#0b0b0f;background:linear-gradient(180deg,#f2d27a,var(--gold));
      padding:10px 14px;border-radius:12px;font-weight:900;font-size:13px;border:1px solid rgba(0,0,0,.25);
    }
    .ghost{color:var(--gold);text-decoration:none;font-weight:900}
    .card{margin-top:14px;border:1px solid var(--line);border-radius:18px;background:rgba(18,18,26,.55);padding:14px}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
    .gallery{border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.03)}
    .mainimg{aspect-ratio:4/3;display:grid;place-items:center}
    .mainimg img{width:100%;height:100%;object-fit:cover;display:block}
    .thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px;border-top:1px solid rgba(255,255,255,.06)}
    .thumb{cursor:pointer;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03)}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;aspect-ratio:1/1}
    h1{margin:0;font-size:22px;line-height:1.2}
    .meta{color:var(--muted);font-size:13px;line-height:1.5;margin-top:10px}
    .tag{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);color:var(--gold);font-size:12px;font-weight:900;background:rgba(212,175,55,.06);margin-top:10px}
    ul{margin:10px 0 0 18px;color:rgba(255,255,255,.78)}
    .ctaBox{margin-top:12px;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}
    .ctaTitle{font-weight:900;margin-bottom:6px}
    .wa{
      display:block;text-align:center;margin-top:10px;
      text-decoration:none;color:#0b0b0f;background:linear-gradient(180deg,#f2d27a,var(--gold));
      padding:12px 14px;border-radius:14px;font-weight:1000;border:1px solid rgba(0,0,0,.25);
    }
    .tiny{color:rgba(255,255,255,.62);font-size:12px;line-height:1.5;margin-top:10px}
    @media (max-width:900px){ .grid{grid-template-columns:1fr} .thumbs{grid-template-columns:repeat(4,1fr)} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="btn" href="/shop.html">← Back to Shop</a>
      <a class="ghost" href="/">Website</a>
    </div>

    <div class="card">
      <div class="grid">
        <div class="gallery">
          <div class="mainimg" id="mainimg"></div>
          <div class="thumbs" id="thumbs"></div>
        </div>

        <div>
          <h1 id="name">Loading…</h1>
          <div class="tag" id="badge" style="display:none"></div>
          <div class="meta" id="price"></div>
          <div class="meta" id="desc"></div>
          <ul id="highlights"></ul>

          <div class="ctaBox">
            <div class="ctaTitle">Check availability / best price on WhatsApp</div>
            <div class="meta" id="fulfillment"></div>
            <a class="wa" id="wa" href="#">WhatsApp Abhishek to confirm</a>
            <div class="tiny">
              You’ll get the right model, genuine piece, and the correct add-ons (strings/pick/capo) without confusion.
            </div>
          </div>

          <div class="tiny" id="codeLine"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WA_NUMBER = "917011328912"; // your WhatsApp
    const params = new URLSearchParams(location.search);
    const slug = params.get("slug");

    function uid(){
      return Math.random().toString(36).slice(2,7).toUpperCase();
    }

    (async function(){
      const res = await fetch("/data/products.json", {cache:"no-store"});
      const data = await res.json();
      const p = (data.products || []).find(x => x.slug === slug) || data.products?.[0];

      if(!p){ document.getElementById("name").textContent = "Product not found"; return; }

      document.getElementById("name").textContent = p.name;
      document.getElementById("price").textContent = p.price_note || "";
      document.getElementById("desc").textContent = p.description || "";

      if(p.tags && p.tags.length){
        const b = document.getElementById("badge");
        b.style.display = "inline-flex";
        b.textContent = p.tags[0];
      }

      const hi = document.getElementById("highlights");
      hi.innerHTML = (p.highlights || []).map(x => `<li>${x}</li>`).join("");

      // Gallery
      const imgs = p.images || [];
      const main = document.getElementById("mainimg");
      const thumbs = document.getElementById("thumbs");

      const setMain = (src) => { main.innerHTML = src ? `<img src="${src}" alt="${p.name}">` : "Image"; };
      setMain(imgs[0] || "");

      thumbs.innerHTML = imgs.slice(0,10).map((src,i) => `
        <div class="thumb" data-src="${src}"><img src="${src}" alt="image ${i+1}"></div>
      `).join("");

      thumbs.addEventListener("click", (e) => {
        const t = e.target.closest(".thumb");
        if(!t) return;
        setMain(t.dataset.src);
      });

      // Fulfillment
      const partner = p.fulfillment?.partner ? `Fulfilled via: ${p.fulfillment.partner}` : "";
      const locs = (p.fulfillment?.locations || []).length ? ` • Locations: ${(p.fulfillment.locations).join(", ")}` : "";
      document.getElementById("fulfillment").textContent = (partner + locs).trim();

      // Tracking code (proves lead came through you)
      const code = `${p.id}-${new Date().toISOString().slice(0,10).replaceAll("-","")}-${uid()}`;
      document.getElementById("codeLine").textContent = `Tracking Code: ${code}`;

      // WhatsApp message
      const msg =
`Hi Abhishek,
I want: ${p.name}
Tracking Code: ${code}
Budget: ₹____
Location: ____
Need: (Guitar/Keyboard) + any add-ons advice.`;

      document.getElementById("wa").href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
    })();
  </script>
</body>
</html>
