name: Daily Blog Generator

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily
  workflow_dispatch:
  permissions:
    contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Create post
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE="blog/post-$DATE.md"

          echo "# Guitar Tip ($DATE)" > $FILE
          echo "" >> $FILE
          echo "Practice C – G – Am – F chord progression for 10 minutes today." >> $FILE
          echo "" >> $FILE
          echo "Learn guitar with **Abhishek Sessions**." >> $FILE

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add blog
          git commit -m "Auto blog post $(date +'%Y-%m-%d')" || echo "No changes"
          git push
