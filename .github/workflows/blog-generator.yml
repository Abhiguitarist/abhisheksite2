name: Daily Blog Generator

on:
  schedule:
    - cron: "0 3 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate blog post + index.json
        run: |
          set -e
          DATE=$(date +'%Y-%m-%d')
          mkdir -p blog
          FILE="blog/post-$DATE.md"

          # Create today's post only if it doesn't already exist
          if [ ! -f "$FILE" ]; then
            echo "# Guitar Tip ($DATE)" > "$FILE"
            echo "" >> "$FILE"
            echo "Practice C – G – Am – F chord progression for 10 minutes today." >> "$FILE"
            echo "" >> "$FILE"
            echo "Learn guitar with **Abhishek Sessions**." >> "$FILE"
          fi

          # Build blog/index.json from all blog/*.md
          python3 - << 'PY'
          import glob, json, os, re

          posts = []
          for path in sorted(glob.glob("blog/*.md"), reverse=True):
            name = os.path.basename(path)
            m = re.match(r"post-(\d{4}-\d{2}-\d{2})\.md$", name)
            date = m.group(1) if m else ""

            with open(path, "r", encoding="utf-8") as f:
              lines = [l.rstrip("\n") for l in f.readlines()]

            title = "Untitled"
            for l in lines:
              if l.strip().startswith("# "):
                title = l.strip()[2:].strip()
                break

            body_lines = [l.strip() for l in lines if l.strip() and not l.strip().startswith("#")]
            excerpt = " ".join(body_lines)[:160]

            posts.append({
              "title": title,
              "date": date,
              "url": f"/blog/{name}",
              "file": name,
              "excerpt": excerpt
            })

          os.makedirs("blog", exist_ok=True)
          with open("blog/index.json", "w", encoding="utf-8") as out:
            json.dump(posts, out, ensure_ascii=False, indent=2)
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main

          git add blog
          git commit -m "Auto blog update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin main
