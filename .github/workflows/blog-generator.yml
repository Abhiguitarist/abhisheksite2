name: Daily Blog Generator

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate blog post
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE="blog/post-$DATE.md"

          mkdir -p blog

          echo "# Guitar Tip ($DATE)" > $FILE
          echo "" >> $FILE
          echo "Practice C – G – Am – F chord progression for 10 minutes today." >> $FILE
          echo "" >> $FILE
          echo "Learn guitar with **Abhishek Sessions**." >> $FILE

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase

          git add blog
          git commit -m "Auto blog post $DATE" || echo "No changes to commit"

          git push
