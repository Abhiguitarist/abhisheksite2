<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="meta-title">Abhishek Sessions</title>

<meta name="description" id="meta-desc">
<meta name="keywords" id="meta-keywords">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:#eaeaea;
font-family:Inter,sans-serif;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:"Playfair Display";
font-size:42px;
margin-bottom:10px;
}

.date{
opacity:.6;
margin-bottom:30px;
}

.featured{
width:100%;
border-radius:12px;
margin:30px 0;
}

.article{
line-height:1.9;
font-size:18px;
}

.article h2{
margin-top:40px;
font-family:"Playfair Display";
}

.cta{
margin-top:60px;
background:#151515;
padding:30px;
border-radius:10px;
text-align:center;
}

.cta a{
background:#c8a96a;
padding:14px 26px;
border-radius:6px;
text-decoration:none;
color:#000;
font-weight:600;
}

.social{
margin-top:50px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.social div{
background:#151515;
padding:20px;
border-radius:10px;
}

.related{
margin-top:60px;
}

.related a{
display:block;
padding:15px;
background:#151515;
margin-bottom:10px;
border-radius:8px;
color:#eaeaea;
text-decoration:none;
}

.whatsapp-sticky{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:16px 20px;
border-radius:40px;
text-decoration:none;
font-weight:600;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>
<div class="date" id="date"></div>

<img id="featured" class="featured">

<div id="content" class="article"></div>

<div class="social">

<div>
<h3>Follow on Instagram</h3>
<p>Daily guitar reels and tips</p>
<a href="https://instagram.com/">Open Instagram</a>
</div>

<div>
<h3>Watch on YouTube</h3>
<p>Song breakdowns and training</p>
<a href="#">Open YouTube</a>
</div>

</div>

<div class="cta">

<h3>Want structured guitar mentorship?</h3>

<p>
Private one-to-one guitar mentorship by Abhishek Sessions.
</p>

<a href="https://wa.me/">Message on WhatsApp</a>

</div>

<div class="related">

<h3>Related Articles</h3>

<div id="related-posts"></div>

</div>

</div>

<a class="whatsapp-sticky" href="https://wa.me/">
Chat on WhatsApp
</a>

<script>

const params = new URLSearchParams(window.location.search);
const file = params.get("post");

fetch(file)
.then(r=>r.text())
.then(text=>{

let title = text.match(/title:\s*"(.+)"/)[1];
let date = text.match(/date:\s*"(.+)"/)[1];
let excerpt = text.match(/excerpt:\s*"(.+)"/)[1];
let keywords = text.match(/keywords:\s*"(.+)"/)[1];

document.getElementById("title").innerText = title;
document.getElementById("date").innerText = date;

document.getElementById("meta-title").innerText = title;
document.getElementById("meta-desc").content = excerpt;
document.getElementById("meta-keywords").content = keywords;

let content = text.split("---")[2];

content = content
.replace(/^### (.*$)/gim,"<h3>$1</h3>")
.replace(/^## (.*$)/gim,"<h2>$1</h2>")
.replace(/^\- (.*$)/gim,"<li>$1</li>")
.replace(/\n/g,"<br>");

document.getElementById("content").innerHTML = content;

});

fetch("/blog/index.json")
.then(r=>r.json())
.then(data=>{

let posts = data.posts.slice(0,3);

let html="";

posts.forEach(p=>{
html += `<a href="/post.html?post=${p.url}">${p.title}</a>`
})

document.getElementById("related-posts").innerHTML = html;

});

</script>

</body>
</html>
